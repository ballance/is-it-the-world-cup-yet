<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup Countdown</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Ctext%20y%3D%22.9em%22%20font-size%3D%2290%22%3E%E2%9A%BD%3C%2Ftext%3E%3C%2Fsvg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #FFD700;
      --gold-dim: rgba(255, 215, 0, 0.78);
      --red: #ff5050;
      --bg: #0a1128;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background:
        radial-gradient(circle at 25% 0%, rgba(191, 10, 48, 0.35), transparent 55%),
        radial-gradient(circle at 90% 100%, rgba(0, 104, 71, 0.35), transparent 50%),
        var(--bg);
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 12px 14px 10px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.45);
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      line-height: 1;
    }
    .tag {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold-dim);
      font-weight: 600;
    }
    .tag.live { color: var(--red); }
    .tag.live .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--red);
      margin-right: 5px;
      animation: pulse 1.2s ease-in-out infinite;
      vertical-align: middle;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.65); }
    }
    .brand {
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.55);
      text-decoration: none;
    }
    .brand:hover { color: var(--gold); }
    .brand .ball { margin-right: 3px; }

    .main {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      text-align: center;
      min-height: 0;
    }
    .teams {
      font-size: clamp(14px, 5vw, 22px);
      font-weight: 700;
      line-height: 1.15;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .countdown {
      font-family: 'Bebas Neue', Impact, "Arial Black", sans-serif;
      font-weight: 400;
      letter-spacing: 0.04em;
      font-size: clamp(28px, 11vw, 56px);
      color: var(--gold);
      line-height: 1;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.5), 0 0 28px rgba(255, 215, 0, 0.25);
    }
    .countdown.score {
      letter-spacing: 0.08em;
    }
    .minute {
      font-size: clamp(11px, 3vw, 14px);
      color: var(--gold-dim);
      letter-spacing: 1px;
    }
    .skeleton {
      color: rgba(255, 255, 255, 0.4);
      font-size: 11px;
      letter-spacing: 1px;
    }
    @media (prefers-reduced-motion: reduce) {
      .tag.live .dot { animation: none; }
    }
  </style>
</head>
<body>
  <div class="row top">
    <span class="tag" id="state">…</span>
    <a class="brand" href="https://worldcupyet.com" target="_blank" rel="noopener">
      <span class="ball">⚽</span>worldcupyet.com
    </a>
  </div>
  <div class="main">
    <div class="teams" id="teams"></div>
    <div class="countdown" id="big"></div>
    <div class="minute" id="sub"></div>
  </div>
  <script>
    (function () {
      const ORIGIN = 'https://worldcupyet.com';
      const TOURNAMENT_END = '2026-07-19T23:59:59Z';

      let matches = [];
      let live = {};
      let liveErrorCount = 0;

      const $state = document.getElementById('state');
      const $teams = document.getElementById('teams');
      const $big   = document.getElementById('big');
      const $sub   = document.getElementById('sub');

      function fmtCountdown(ms) {
        if (ms <= 0) return '0s';
        const t = Math.floor(ms / 1000);
        const d = Math.floor(t / 86400);
        const h = Math.floor((t % 86400) / 3600);
        const m = Math.floor((t % 3600) / 60);
        const s = t % 60;
        if (d > 0) return d + 'd ' + h + 'h';
        if (h > 0) return h + 'h ' + m + 'm';
        if (m > 0) return m + 'm ' + (s < 10 ? '0' + s : s) + 's';
        return s + 's';
      }

      function findLiveMatch() {
        for (const key of Object.keys(live)) {
          const entry = live[key];
          if (entry && entry.status === 'LIVE') {
            const match = matches.find(function (m) { return m.id === parseInt(key, 10); });
            if (match) return { match: match, entry: entry };
          }
        }
        return null;
      }

      function findNextScheduledMatch(now) {
        const sorted = matches.slice().sort(function (a, b) {
          return new Date(a.kickoffUtc) - new Date(b.kickoffUtc);
        });
        for (let i = 0; i < sorted.length; i++) {
          if (new Date(sorted[i].kickoffUtc) > now) return sorted[i];
        }
        return null;
      }

      function setLive(payload) {
        $state.innerHTML = '<span class="dot"></span>LIVE';
        $state.className = 'tag live';
        $teams.textContent = payload.match.home.name + ' vs ' + payload.match.away.name;
        $big.textContent = payload.entry.homeScore + ' – ' + payload.entry.awayScore;
        $big.className = 'countdown score';
        $sub.textContent = payload.entry.minute
          ? payload.entry.minute
          : (payload.match.venue.city || '');
      }

      function setNext(next, now) {
        $state.textContent = 'Next match';
        $state.className = 'tag';
        $teams.textContent = next.home.name + ' vs ' + next.away.name;
        const ms = new Date(next.kickoffUtc) - now;
        $big.textContent = fmtCountdown(ms);
        $big.className = 'countdown';
        $sub.textContent = next.venue.city || '';
      }

      function setOver() {
        $state.textContent = 'Tournament complete';
        $state.className = 'tag';
        $teams.textContent = 'See you in 2030';
        $big.textContent = '🏆';
        $big.className = 'countdown';
        $sub.textContent = '';
      }

      function render() {
        if (matches.length === 0) {
          $state.textContent = 'Loading…';
          $state.className = 'tag';
          return;
        }
        const now = new Date();
        const livePayload = findLiveMatch();
        if (livePayload) { setLive(livePayload); return; }
        const next = findNextScheduledMatch(now);
        if (next) { setNext(next, now); return; }
        setOver();
      }

      function bust() { return Math.floor(Date.now() / 20000); }

      function loadMatches() {
        return fetch(ORIGIN + '/matches.json?v=embed', { cache: 'force-cache' })
          .then(function (r) { return r.json(); })
          .then(function (data) { matches = data.matches || []; })
          .catch(function () { /* keep prior matches if any */ });
      }

      function loadLive() {
        return fetch(ORIGIN + '/live.json?v=' + bust(), { cache: 'no-store' })
          .then(function (r) {
            if (!r.ok) throw new Error('http ' + r.status);
            return r.json();
          })
          .then(function (data) {
            live = data.matches || {};
            liveErrorCount = 0;
          })
          .catch(function () {
            liveErrorCount++;
            // Stay quiet on transient failures.
          });
      }

      function shouldPollLive() {
        if (!matches.length) return false;
        const now = Date.now();
        const windowMs = 2 * 60 * 60 * 1000;
        return matches.some(function (m) {
          const k = new Date(m.kickoffUtc).getTime();
          return now >= k && now < k + windowMs;
        });
      }

      let livePollHandle = null;
      function armLivePolling() {
        if (livePollHandle) return;
        if (!shouldPollLive()) return;
        loadLive().then(render);
        livePollHandle = setInterval(function () {
          if (!shouldPollLive()) {
            clearInterval(livePollHandle);
            livePollHandle = null;
            return;
          }
          loadLive().then(render);
        }, 30000);
      }

      loadMatches().then(function () {
        render();
        armLivePolling();
        // Re-evaluate live polling at the top of each minute.
        setInterval(function () {
          render();
          armLivePolling();
        }, 1000);
      });
    })();
  </script>
</body>
</html>
